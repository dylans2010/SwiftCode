name: Create New Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Verify Xcode Version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Clean Build Environment
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Resolve Package Dependencies
        run: xcodebuild -project SwiftCode.xcodeproj -scheme SwiftCode -resolvePackageDependencies

      - name: Compile and Build .ipa
        run: |
          mkdir -p upload
          xcodebuild -project SwiftCode.xcodeproj \
            -scheme SwiftCode \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath upload/SwiftCode.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          mkdir -p upload/Payload
          cp -R upload/SwiftCode.xcarchive/Products/Applications/*.app upload/Payload/
          cd upload
          zip -r SwiftCode.ipa Payload

      - name: Verify IPA
        run: |
          ls -la upload/
          test -f upload/SwiftCode.ipa && echo "IPA created successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SwiftCode Build ${{ github.run_number }}
          files: upload/SwiftCode.ipa
          generate_release_notes: true
