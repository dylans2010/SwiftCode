name: Build Project

on:
  push:
    branches: [ build-project ]
  workflow_dispatch:

jobs:
  generate:
    name: Generate Xcode Project
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Detect Project Name and Sources
        id: detect
        run: |
          # Use the repository name as project name if not otherwise specified
          PROJECT_NAME=$(basename "$GITHUB_REPOSITORY")
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT

          SOURCES=""
          for dir in Sources Views Features; do
            if [ -d "$dir" ]; then
              if [ -z "$SOURCES" ]; then
                SOURCES="      - $dir"
              else
                SOURCES="$SOURCES\n      - $dir"
              fi
            fi
          done

          if [ -z "$SOURCES" ]; then
            echo "::error::No source folders found (Sources/, Views/, Features/). At least one is required."
            exit 1
          fi

          # Use printf to handle newlines correctly in GitHub Output
          printf "SOURCES<<EOF\n%s\nEOF\n" "$SOURCES" >> $GITHUB_OUTPUT

      - name: Create Info.plist if missing
        run: |
          if [ ! -f "Info.plist" ]; then
            echo "Info.plist missing, creating default..."
            cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>\$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>\$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>\$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSupportsIndirectInputEvents</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF
          fi

      - name: Generate project.yml
        run: |
          PROJECT_NAME="${{ steps.detect.outputs.PROJECT_NAME }}"
          # Create a safe bundle identifier suffix
          SAFE_NAME=$(echo "$PROJECT_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]')

          cat <<EOF > project.yml
          name: $PROJECT_NAME
          options:
            bundleIdPrefix: com.swiftcode.userproject
            deploymentTarget:
              iOS: "16.0"
          settings:
            base:
              SWIFT_VERSION: 5.0
              IPHONEOS_DEPLOYMENT_TARGET: 16.0
              TARGETED_DEVICE_FAMILY: "1,2"
          configs:
            Debug: debug
            Release: release
          targets:
            $PROJECT_NAME:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources:
          ${{ steps.detect.outputs.SOURCES }}
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.swiftcode.userproject.$SAFE_NAME
                  INFOPLIST_FILE: Info.plist
          EOF

      - name: Run XcodeGen
        run: xcodegen generate

      - name: Upload Project Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcode-project
          path: |
            *.xcodeproj
            *.xcworkspace
          if-no-files-found: error
